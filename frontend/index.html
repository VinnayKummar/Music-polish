<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polish — Music Matching</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="authSection" class="auth-screen">
    <div class="auth-glow"></div>
    <div class="auth-card">
        <div class="auth-logo"><span class="logo-icon">♫</span></div>
        <h1 class="auth-title">Polish</h1>
        <p class="auth-subtitle">Find your music twin</p>
        <form onsubmit="return false" class="auth-form">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" autocomplete="off">
            </div>
            <div class="auth-actions">
                <button type="button" class="btn-ghost" onclick="signup()">Create account</button>
                <button type="button" class="btn-solid" onclick="login()">Sign in →</button>
            </div>
        </form>
        <p id="authMessage" class="auth-msg"></p>
    </div>
</div>

<div id="appSection" class="app hidden">

    <header class="top-nav">
        <span class="nav-logo">♫ Polish</span>
        <div class="nav-right">
            <span id="userGreeting" class="nav-user"></span>
            <button type="button" class="btn-logout" onclick="logout()">Leave</button>
        </div>
    </header>

    <div class="content-wrap">

        <div class="left-col">

            <div class="now-playing-hero">
                <div class="vinyl-wrap">
                    <div class="vinyl" id="vinylDisc">
                        <div class="vinyl-groove g1"></div>
                        <div class="vinyl-groove g2"></div>
                        <div class="vinyl-groove g3"></div>
                        <div class="vinyl-dot"></div>
                    </div>
                    <div class="vinyl-glow"></div>
                </div>
                <div class="np-meta">
                    <span class="np-label">NOW PLAYING</span>
                    <h2 id="nowPlaying" class="np-title">Pick a track</h2>
                    <p id="matchResult" class="np-match"></p>
                </div>
            </div>

            <div class="player-controls">
                <input type="range" id="progressBar" class="seek-bar" value="0" min="0" max="100">
                <div class="ctrl-row">
                    <button type="button" class="ctrl-btn" onclick="previousSong()">⏮</button>
                    <button type="button" class="ctrl-btn ctrl-play" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
                    <button type="button" class="ctrl-btn" onclick="nextSong()">⏭</button>
                </div>
            </div>

        </div>

        <div class="right-col">

            <div class="library">
                <h3 class="section-title">Your Library</h3>
                <div class="track-list">

                    <div class="track-card track-1" onclick="playSong('song1.mp3', this)">
                        <div class="track-art">🔥</div>
                        <div class="track-meta">
                            <span class="track-name">Song 1</span>
                            <span class="track-artist">Unknown Artist</span>
                        </div>
                        <div class="track-action">▶</div>
                    </div>

                    <div class="track-card track-2" onclick="playSong('song2.mp3', this)">
                        <div class="track-art">🌌</div>
                        <div class="track-meta">
                            <span class="track-name">Song 2</span>
                            <span class="track-artist">Unknown Artist</span>
                        </div>
                        <div class="track-action">▶</div>
                    </div>

                    <div class="track-card track-3" onclick="playSong('song3.mp3', this)">
                        <div class="track-art">🌊</div>
                        <div class="track-meta">
                            <span class="track-name">Song 3</span>
                            <span class="track-artist">Unknown Artist</span>
                        </div>
                        <div class="track-action">▶</div>
                    </div>

                    <div class="track-card track-4" onclick="playSong('song4.mp3', this)">
                        <div class="track-art">⚡</div>
                        <div class="track-meta">
                            <span class="track-name">Song 4</span>
                            <span class="track-artist">Unknown Artist</span>
                        </div>
                        <div class="track-action">▶</div>
                    </div>

                </div>
            </div>

            <div class="listeners-popup hidden" id="listenersList"></div>

        </div>
    </div>

    <div class="chat-panel hidden" id="chatSection">
        <div class="chat-top">
            <div class="chat-with-info">
                <div class="chat-avatar">👤</div>
                <h3 id="chatWith" class="chat-name"></h3>
            </div>
            <button type="button" class="chat-close" onclick="closeChat()">✕</button>
        </div>
        <div id="chatBox" class="chat-messages"></div>
        <div class="chat-bottom">
            <input type="text" id="chatInput" class="chat-input" placeholder="Say something..." autocomplete="off">
            <button type="button" class="chat-send" onclick="sendMessage()">↑</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
